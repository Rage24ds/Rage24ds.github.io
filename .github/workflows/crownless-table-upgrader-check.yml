name: Crownless Table upgrader check

on:
  push:
    paths:
      - 'downloads/CrownlessTable_v0_6_0_upgrade.py'
      - '.github/workflows/crownless-table-upgrader-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile upgrader
        shell: pwsh
        run: py -m py_compile downloads/CrownlessTable_v0_6_0_upgrade.py
